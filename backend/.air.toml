root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/nats-ui-backend ./cmd/server"
  bin = "./tmp/nats-ui-backend"
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
