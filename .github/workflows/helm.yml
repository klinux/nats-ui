name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - ".github/workflows/helm.yml"
  pull_request:
    branches: [main]
    paths:
      - "helm/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/nats-ui

      - name: Template chart
        run: |
          helm template nats-ui helm/nats-ui \
            --set secrets.adminPass=test \
            --set secrets.jwtSecret=test

      - name: Template with ingress
        run: |
          helm template nats-ui helm/nats-ui \
            --set ingress.enabled=true \
            --set "ingress.hosts[0].host=test.local" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix"

      - name: Template with gateway
        run: |
          helm template nats-ui helm/nats-ui \
            --set gateway.enabled=true \
            --set "gateway.parentRefs[0].name=test-gw" \
            --set "gateway.hostnames[0]=test.local"

      - name: Template with all OAuth2 providers
        run: |
          helm template nats-ui helm/nats-ui \
            --set oauth2.google.clientID=test \
            --set oauth2.github.clientID=test \
            --set oauth2.keycloak.url=https://kc.test \
            --set oauth2.keycloak.clientID=test \
            --set oauth2.oidc.issuerURL=https://oidc.test \
            --set oauth2.oidc.clientID=test

